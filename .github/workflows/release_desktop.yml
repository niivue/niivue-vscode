name: Release Desktop (Tauri)

on:
  push:
    tags:
      - '@niivue/desktop@*'
  workflow_dispatch:
  # Reusable entry point for the pre-release lane (prerelease.yml). When
  # `version` is set, the build stamps it into the manifests; when
  # `release_tag` is set, bundles are attached to that existing pre-release
  # instead of creating a new stable release from a git tag.
  workflow_call:
    inputs:
      version:
        description: >-
          Explicit version to stamp into the desktop manifests before building
          (pre-release lane). Empty = build the version already in the
          checked-out manifests (stable tag lane).
        type: string
        required: false
        default: ''
      release_tag:
        description: >-
          Existing GitHub release to attach the built bundles to (pre-release
          lane). Empty = create a release from the triggering git tag (stable
          lane).
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tauri/src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm turbo build --filter=@niivue/react

      # Pre-release lane: overwrite the version in package.json,
      # tauri.conf.json and Cargo.toml so the bundle/installer metadata matches
      # the computed beta version. The stable tag lane derives its version from
      # package.json in the next step instead.
      - name: Stamp pre-release version
        if: ${{ inputs.version }}
        run: node scripts/release/set-desktop-version.mjs "${{ inputs.version }}"

      # Stable tag lane: changesets bumps only apps/desktop-tauri/package.json
      # in the "Version Packages" PR; it never touches tauri.conf.json or
      # Cargo.toml, which `tauri build` reads for the bundle/installer version.
      # Derive the version from package.json and stamp all three so the built
      # installer matches the @niivue/desktop@<version> tag this run was
      # dispatched for. Skipped on the pre-release lane (handled above). Uses
      # bash explicitly so the command substitution works on the Windows runner
      # too (its default shell is pwsh).
      - name: Stamp stable version from package.json
        if: ${{ ! inputs.version }}
        shell: bash
        run: |
          version=$(node -p "require('./apps/desktop-tauri/package.json').version")
          echo "Stable lane: stamping desktop manifests with $version (from package.json)"
          node scripts/release/set-desktop-version.mjs "$version"

      - name: Build Tauri app
        run: pnpm exec tauri build --target ${{ matrix.target }}
        working-directory: ./apps/desktop-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-${{ matrix.target }}
          path: |
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos-${{ matrix.target }}
          path: |
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-${{ matrix.target }}
          path: |
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # Pre-release lane: attach the installers to the rolling pre-release
      # created by prerelease.yml (do NOT recreate it, so the release body
      # listing the other apps survives). Bundle filenames contain spaces
      # ("NiiVue Desktop_..."), so collect them null-delimited. Only the
      # distributable installers are uploaded — the raw macOS `.app` bundle
      # directory is skipped.
      - name: Attach bundles to existing pre-release
        if: ${{ inputs.release_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' -t files < <(find artifacts -type f \
            \( -name '*.deb' -o -name '*.AppImage' -o -name '*.dmg' \
               -o -name '*.msi' -o -name '*.exe' \) -print0)
          echo "Uploading ${#files[@]} file(s) to ${{ inputs.release_tag }}:"
          printf '  %s\n' "${files[@]}"
          gh release upload "${{ inputs.release_tag }}" "${files[@]}" \
            --clobber --repo "$GITHUB_REPOSITORY"

      # Stable lane: create the release from the triggering git tag.
      - name: Create GitHub Release
        if: ${{ ! inputs.release_tag }}
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-beta.') || contains(github.ref, '-rc.') || contains(github.ref, '-alpha.') }}
