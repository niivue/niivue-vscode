name: Pre-release

# Auto-publish pre-releases on a daily schedule (03:00 UTC) whenever main has
# pending changesets. Running on a timer instead of on every push caps beta
# releases at a maximum of one per day, no matter how many times main is
# pushed (frequent dependabot merges previously produced a beta each).
# Versions are derived from the same source of truth as the next stable (the
# queued changesets), so beta numbers always reflect what the next stable
# will be. Scheme:
#   - VS Code: <major>.<next-odd-minor>.<run>  (e.g. stable 2.10.0 → pre 2.11.<run>)
#   - PyPI:    <next-stable>.dev<run>          (PEP 440 development release)
#
# The job no-ops when there are no pending changesets (e.g. after a day of
# doc-only commits), and also skips publish for any individual app that
# changesets did not bump. Use the workflow_dispatch trigger to force an
# off-schedule beta. Stable releases stay on the Release Coordinator path
# (merge the "Version Packages" PR).

on:
  schedule:
    # Daily at 03:00 UTC. Caps pre-releases at one per day; GitHub runs
    # scheduled workflows against the latest commit on the default branch.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerelease:
    name: Build and publish pre-releases
    runs-on: ubuntu-latest
    # Exposed for the desktop job below: whether @niivue/desktop was bumped and
    # the beta version to stamp into its cross-platform build.
    outputs:
      desktop: ${{ steps.encode.outputs.desktop }}
      desktop_version: ${{ steps.encode.outputs.desktop_version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # Bail early if there are no pending changesets. Without any, there's
      # nothing semantically new to pre-release on top of the last stable.
      # Empty-frontmatter changesets (used as test-only / docs-only markers
      # that satisfy the "every PR touching packages/apps needs a changeset"
      # rule without bumping a version) are skipped here too — they have no
      # package bumps so the pre-release would publish nothing.
      - name: Detect pending changesets
        id: detect
        run: |
          shopt -s nullglob
          count=0
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            # A changeset is "empty" if its frontmatter (everything between
            # the first pair of `---` lines) has no non-blank content lines —
            # i.e. no `"<package>": <bump>` entries.
            if ! awk '/^---$/{c++; next} c==1 && NF>0' "$f" | grep -q .; then
              echo "  skipping empty changeset: $(basename "$f")"
              continue
            fi
            count=$((count + 1))
          done
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $count pending changeset(s)."
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets — skipping pre-release."
          fi

      - uses: pnpm/action-setup@v6
        if: steps.detect.outputs.has_changesets == 'true'

      - uses: actions/setup-node@v6
        if: steps.detect.outputs.has_changesets == 'true'
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-python@v6
        if: steps.detect.outputs.has_changesets == 'true'
        with:
          python-version: '3.11'

      - name: Install JS dependencies
        if: steps.detect.outputs.has_changesets == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Python build tools
        if: steps.detect.outputs.has_changesets == 'true'
        run: python -m pip install "jupyterlab>=4.0.0,<5" build twine

      # Compute "what would the next stable be?" via `changeset status
      # --output`, which writes a ReleasePlan JSON ({name, oldVersion,
      # newVersion, type} per bumped package) without mutating any files.
      # Snapshot mode is unsuitable here: by default it uses 0.0.0 as the
      # base (not the calculated next-stable), so reading the bumped
      # version back can't recover the intended pre-release base.
      - name: Compute release plan
        if: steps.detect.outputs.has_changesets == 'true'
        run: pnpm changeset status --output=changeset-status.json

      - name: Encode pre-release versions per target
        if: steps.detect.outputs.has_changesets == 'true'
        id: encode
        run: |
          node scripts/release/encode-prerelease-versions.mjs ${{ github.run_number }}
          echo "vscode=$(node -p "require('./prerelease-targets.json').vscode")"       >> "$GITHUB_OUTPUT"
          echo "jupyter=$(node -p "require('./prerelease-targets.json').jupyter")"     >> "$GITHUB_OUTPUT"
          echo "streamlit=$(node -p "require('./prerelease-targets.json').streamlit")" >> "$GITHUB_OUTPUT"
          echo "desktop=$(node -p "require('./prerelease-targets.json').desktop")"     >> "$GITHUB_OUTPUT"
          echo "desktop_version=$(node -p "require('./prerelease-targets.json').desktopVersion || ''")" >> "$GITHUB_OUTPUT"

      # ── Build everything ───────────────────────────────────────────────────
      - name: Build all apps
        if: steps.detect.outputs.has_changesets == 'true'
        run: pnpm turbo build

      # ── VS Code ────────────────────────────────────────────────────────────
      - name: Package VS Code extension
        if: steps.encode.outputs.vscode == 'true'
        run: pnpm vsce package --pre-release
        working-directory: ./apps/vscode

      - name: Publish to VS Code Marketplace
        if: steps.encode.outputs.vscode == 'true'
        run: pnpm vsce publish --pre-release
        working-directory: ./apps/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.encode.outputs.vscode == 'true'
        run: pnpm ovsx publish *.vsix --pre-release
        working-directory: ./apps/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # ── JupyterLab ─────────────────────────────────────────────────────────
      - name: Build JupyterLab Python package
        if: steps.encode.outputs.jupyter == 'true'
        run: python -m build
        working-directory: ./apps/jupyter

      - name: Publish JupyterLab to PyPI
        if: steps.encode.outputs.jupyter == 'true'
        run: python -m twine upload dist/*
        working-directory: ./apps/jupyter
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # ── Streamlit ──────────────────────────────────────────────────────────
      - name: Build Streamlit Python package
        if: steps.encode.outputs.streamlit == 'true'
        run: python -m build
        working-directory: ./apps/streamlit

      - name: Publish Streamlit to PyPI
        if: steps.encode.outputs.streamlit == 'true'
        run: python -m twine upload dist/*
        working-directory: ./apps/streamlit
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # ── GitHub Release ─────────────────────────────────────────────────────
      # The release lists only the apps that were actually bumped. Apps that
      # were skipped (no changeset touched them) do not appear in the notes.
      - name: Prepare release notes
        if: steps.detect.outputs.has_changesets == 'true' &&
            (steps.encode.outputs.vscode == 'true' ||
             steps.encode.outputs.jupyter == 'true' ||
             steps.encode.outputs.streamlit == 'true' ||
             steps.encode.outputs.desktop == 'true')
        id: notes
        run: |
          {
            echo 'body<<EOF'
            echo "Automated pre-release from commit ${{ github.sha }}."
            echo ""
            if [ "${{ steps.encode.outputs.vscode }}" = "true" ]; then
              v=$(node -p "require('./apps/vscode/package.json').version")
              echo "- **VS Code**: \`$v\` — install via Marketplace (pre-release channel) or download \`.vsix\` below"
            fi
            if [ "${{ steps.encode.outputs.jupyter }}" = "true" ]; then
              v=$(node -p "require('./apps/jupyter/package.json').version")
              echo "- **JupyterLab**: \`$v\` — \`pip install --pre jupyterlab_niivue\`"
            fi
            if [ "${{ steps.encode.outputs.streamlit }}" = "true" ]; then
              v=$(node -p "require('./apps/streamlit/package.json').version")
              echo "- **Streamlit**: \`$v\` — \`pip install --pre niivue-streamlit\`"
            fi
            if [ "${{ steps.encode.outputs.desktop }}" = "true" ]; then
              echo "- **Desktop (Tauri)**: \`${{ steps.encode.outputs.desktop_version }}\` — download the installer for your platform from the assets below (built separately; appears a few minutes after this release is published)"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub pre-release
        if: steps.detect.outputs.has_changesets == 'true' &&
            (steps.encode.outputs.vscode == 'true' ||
             steps.encode.outputs.jupyter == 'true' ||
             steps.encode.outputs.streamlit == 'true' ||
             steps.encode.outputs.desktop == 'true')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: prerelease-${{ github.sha }}
          prerelease: true
          make_latest: false
          name: "Pre-release ${{ github.run_number }}"
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: false
          files: |
            apps/vscode/*.vsix
            apps/jupyter/dist/*
            apps/streamlit/dist/*

  # ── Desktop (Tauri) ────────────────────────────────────────────────────────
  # The cross-platform Tauri installers (Linux/macOS/Windows) are built by the
  # reusable release_desktop.yml. It runs only when a changeset bumped
  # @niivue/desktop, stamps the computed beta version into the manifests, and
  # attaches the installers to the pre-release created above. Kept as a separate
  # job because the desktop build needs a platform matrix and Rust toolchains
  # the single-runner publish job above cannot provide.
  desktop:
    name: Build and publish desktop pre-release
    needs: prerelease
    if: needs.prerelease.outputs.desktop == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release_desktop.yml
    with:
      version: ${{ needs.prerelease.outputs.desktop_version }}
      release_tag: prerelease-${{ github.sha }}
    secrets: inherit
