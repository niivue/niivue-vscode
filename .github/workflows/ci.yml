name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      pwa: ${{ steps.filter.outputs.pwa }}
      jupyter: ${{ steps.filter.outputs.jupyter }}
      vscode: ${{ steps.filter.outputs.vscode }}
      streamlit: ${{ steps.filter.outputs.streamlit }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
            pwa:
              - 'apps/pwa/**'
              - 'packages/**'
            jupyter:
              - 'apps/jupyter/**'
              - 'packages/**'
            vscode:
              - 'apps/vscode/**'
              - 'packages/**'
            streamlit:
              - 'apps/streamlit/**'
              - 'packages/**'

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type check
        run: pnpm turbo type-check

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

  test-pwa:
    needs: [changes, build]
    if: needs.changes.outputs.pwa == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Test PWA (with coverage)
        run: |
          pnpm --filter=@niivue/react test:coverage
          pnpm --filter=@niivue/pwa test:coverage

      - name: Upload unit coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit-pwa
          path: |
            packages/niivue-react/coverage/
            apps/pwa/coverage/unit/
          if-no-files-found: ignore
          retention-days: 1

  test-jupyter:
    needs: [changes, build]
    if: needs.changes.outputs.jupyter == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Install Python dependencies
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Test Jupyter extension
        run: |
          cd apps/jupyter
          python -m pip install .[test]
          jupyter labextension list
          python -m jupyterlab.browser_check

      - name: Run Jupyter vitest coverage
        run: pnpm --filter=@niivue/jupyter test:coverage
        continue-on-error: true

      - name: Upload Jupyter vitest coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit-jupyter
          path: apps/jupyter/coverage/unit/
          if-no-files-found: ignore
          retention-days: 1

  test-streamlit:
    needs: [changes, build]
    if: needs.changes.outputs.streamlit == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Install Python test dependencies
        run: |
          cd apps/streamlit
          python -m pip install pytest pytest-cov streamlit

      - name: Run Streamlit frontend tests
        run: pnpm turbo test:frontend --filter=@niivue/streamlit

      - name: Run Streamlit Python tests
        run: pnpm turbo test:python --filter=@niivue/streamlit

      - name: Run Streamlit frontend coverage
        run: cd apps/streamlit/niivue_component/frontend && pnpm test:coverage
        continue-on-error: true

      - name: Run Streamlit Python coverage
        run: |
          cd apps/streamlit
          python -m pytest tests/ --cov=niivue_component --cov-report=json:./coverage/python/coverage.json --cov-report=html:./coverage/python
        continue-on-error: true

      - name: Upload Streamlit coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-streamlit
          path: |
            apps/streamlit/niivue_component/frontend/coverage/
            apps/streamlit/coverage/python/
          if-no-files-found: ignore
          retention-days: 1

  e2e-tests:
    needs: [changes, build]
    if: needs.changes.outputs.pwa == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        working-directory: ./apps/pwa

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: ./apps/pwa

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/pwa/playwright-report/
          retention-days: 30

      - name: Upload e2e coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-e2e-pwa
          path: apps/pwa/coverage/e2e/
          if-no-files-found: ignore
          retention-days: 1

  coverage:
    needs: [test-pwa, test-jupyter, test-streamlit, e2e-tests]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download pwa/react coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-pwa
          path: .
        continue-on-error: true

      - name: Download Jupyter coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-jupyter
          path: .
        continue-on-error: true

      - name: Download Streamlit coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-streamlit
          path: .
        continue-on-error: true

      - name: Download e2e coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-e2e-pwa
          path: apps/pwa/coverage/e2e/
        continue-on-error: true

      - name: Aggregate coverage reports
        run: node scripts/coverage/aggregate.mjs

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: coverage/merged/
          retention-days: 30

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: |
            coverage/summary.json
            coverage/summary.md
          retention-days: 30

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage/summary.md
