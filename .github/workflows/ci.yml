name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      pwa: ${{ steps.filter.outputs.pwa }}
      jupyter: ${{ steps.filter.outputs.jupyter }}
      vscode: ${{ steps.filter.outputs.vscode }}
      streamlit: ${{ steps.filter.outputs.streamlit }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
            pwa:
              - 'apps/pwa/**'
              - 'packages/**'
            jupyter:
              - 'apps/jupyter/**'
              - 'packages/**'
            vscode:
              - 'apps/vscode/**'
              - 'packages/**'
            streamlit:
              - 'apps/streamlit/**'
              - 'packages/**'
            desktop:
              - 'apps/desktop-tauri/**'
              - 'packages/**'

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type check
        run: pnpm turbo type-check

      - name: Coverage aggregator unit tests
        run: pnpm coverage:report:test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

  test-pwa:
    needs: [changes, build]
    if: needs.changes.outputs.pwa == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Test PWA (with coverage)
        run: |
          pnpm --filter=@niivue/react test:coverage
          pnpm --filter=@niivue/pwa test:coverage

      - name: Upload unit coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit-pwa
          path: |
            packages/niivue-react/coverage/
            apps/pwa/coverage/unit/
          if-no-files-found: ignore
          retention-days: 1

  test-jupyter:
    needs: [changes, build]
    if: needs.changes.outputs.jupyter == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Install Python dependencies
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Test Jupyter extension
        run: |
          cd apps/jupyter
          python -m pip install .[test]
          jupyter labextension list
          python -m jupyterlab.browser_check

      - name: Run Jupyter vitest coverage
        run: pnpm --filter=@niivue/jupyter test:coverage
        continue-on-error: true

      - name: Upload Jupyter vitest coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit-jupyter
          path: apps/jupyter/coverage/unit/
          if-no-files-found: ignore
          retention-days: 1

  test-vscode:
    needs: [changes, build]
    if: needs.changes.outputs.vscode == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Run VS Code extension vitest coverage
        run: pnpm --filter=niivue test:coverage

      - name: Upload VS Code vitest coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit-vscode
          path: apps/vscode/coverage/unit/
          if-no-files-found: ignore
          retention-days: 1

  test-streamlit:
    needs: [changes, build]
    if: needs.changes.outputs.streamlit == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Install Python test dependencies
        run: |
          cd apps/streamlit
          python -m pip install pytest pytest-cov streamlit

      - name: Run Streamlit frontend tests
        run: pnpm turbo test:frontend --filter=@niivue/streamlit

      - name: Run Streamlit Python tests
        run: pnpm turbo test:python --filter=@niivue/streamlit

      - name: Run Streamlit frontend coverage
        run: cd apps/streamlit/niivue_component/frontend && pnpm test:coverage
        continue-on-error: true

      - name: Run Streamlit Python coverage
        run: |
          cd apps/streamlit
          python -m pytest tests/ --cov=niivue_component --cov-report=json:./coverage/python/coverage.json --cov-report=html:./coverage/python
        continue-on-error: true

      - name: Upload Streamlit coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-streamlit
          path: |
            apps/streamlit/niivue_component/frontend/coverage/
            apps/streamlit/coverage/python/
          if-no-files-found: ignore
          retention-days: 1

  test-desktop:
    needs: [changes, build]
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Run Desktop vitest coverage
        run: pnpm --filter=@niivue/tauri test:coverage

      - name: Upload Desktop vitest coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-unit-desktop
          path: apps/desktop-tauri/coverage/unit/
          if-no-files-found: ignore
          retention-days: 1

  e2e-tests:
    needs: [changes, build]
    if: needs.changes.outputs.pwa == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        uses: actions/cache@v5
        with:
          path: |
            apps/*/dist
            apps/*/build
            apps/*/lib
            packages/*/dist
          key: build-artifacts-${{ github.sha }}

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        working-directory: ./apps/pwa

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: ./apps/pwa

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/pwa/playwright-report/
          retention-days: 30

      - name: Upload e2e coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-e2e-pwa
          path: apps/pwa/coverage/e2e/
          if-no-files-found: ignore
          retention-days: 1

  coverage:
    # Aggregates per-package coverage and uploads the publishable directory as
    # an artifact. The actual gh-pages deploy + PR comment happen in the
    # "Coverage Report" workflow (triggered by workflow_run of this CI run),
    # which is the only place that holds write permissions. This split keeps
    # the trust boundary clean: this job runs after PR code has executed in
    # the upstream test jobs and must not have any write access.
    needs: [test-pwa, test-jupyter, test-vscode, test-streamlit, test-desktop, e2e-tests]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download pwa/react coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit-pwa
          path: .
        continue-on-error: true

      - name: Download Jupyter coverage artifacts
        # upload-artifact@v4 strips the parent path for single-path uploads,
        # so the artifact's files sit at its root. Extract them back under
        # apps/jupyter/coverage/unit/ so the aggregator's walk (which requires
        # a `coverage` path segment) picks them up. Same fix as VS Code below.
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit-jupyter
          path: apps/jupyter/coverage/unit/
        continue-on-error: true

      - name: Download VS Code coverage artifacts
        # upload-artifact@v4 strips the parent path for single-path uploads,
        # so the artifact's files sit at its root. Extract them back under
        # apps/vscode/coverage/unit/ so the aggregator's walk (which requires
        # a `coverage` path segment) picks them up.
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit-vscode
          path: apps/vscode/coverage/unit/
        continue-on-error: true

      - name: Download Streamlit coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage-streamlit
          path: .
        continue-on-error: true

      - name: Download Desktop coverage artifacts
        # upload-artifact@v4 strips the parent path for single-path uploads,
        # so the artifact's files sit at its root. Extract them back under
        # apps/desktop-tauri/coverage/unit/ so the aggregator's walk (which
        # requires a `coverage` path segment) picks them up.
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit-desktop
          path: apps/desktop-tauri/coverage/unit/
        continue-on-error: true

      - name: Download e2e coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage-e2e-pwa
          path: apps/pwa/coverage/e2e/
        continue-on-error: true

      - name: Determine coverage deploy target
        id: target
        run: |
          repo_name="${{ github.event.repository.name }}"
          owner="${{ github.repository_owner }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            dest="coverage/pr-${{ github.event.pull_request.number }}"
          else
            dest="coverage/main"
          fi
          url="https://${owner}.github.io/${repo_name}/${dest}/"
          badge_url="https://img.shields.io/endpoint?url=${url}badge.json"
          {
            echo "dest=${dest}"
            echo "url=${url}"
            echo "badge_url=${badge_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch baseline coverage from main (for delta)
        continue-on-error: true
        run: |
          baseline_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/coverage/main/summary.json"
          if curl -fsSL "$baseline_url" -o /tmp/coverage-baseline.json; then
            echo "COVERAGE_BASELINE=/tmp/coverage-baseline.json" >> "$GITHUB_ENV"
            echo "Baseline fetched from $baseline_url"
          else
            echo "No baseline available at $baseline_url (first run or main not yet published)"
          fi

      - name: Aggregate coverage reports
        env:
          COVERAGE_REPORT_URL: ${{ steps.target.outputs.url }}
          COVERAGE_BADGE_URL: ${{ steps.target.outputs.badge_url }}
        run: node scripts/coverage/aggregate.mjs

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-merged
          path: coverage/merged/
          retention-days: 30

      - name: Upload coverage summary
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary
          path: |
            coverage/summary.json
            coverage/summary.md
            coverage/badge.json
          retention-days: 30

      - name: Stage publishable coverage assets
        # aggregate.mjs exits 0 when no coverage JSON files are present (e.g.
        # docs-only commits where all test jobs were skipped) — skip staging
        # rather than failing on missing files.
        if: hashFiles('coverage/merged/index.html') != ''
        env:
          DEST: ${{ steps.target.outputs.dest }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Explicit PR head SHA the build was for. Carried in the artifact so
          # the downstream Coverage Report workflow can validate without
          # inferring from workflow_run.head_sha (which is the merge SHA for
          # pull_request, and the dispatch-branch SHA for workflow_dispatch).
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mkdir -p coverage/publish
          # Flatten merged/index.html to publish/ root so the deploy URL serves it directly
          cp coverage/merged/index.html coverage/publish/index.html
          cp coverage/badge.json coverage/publish/
          cp coverage/summary.json coverage/publish/
          cp coverage/summary.md coverage/publish/
          # Metadata file consumed by the Coverage Report workflow. PR_NUMBER
          # may be empty (push to main) — emit null in that case so jq can
          # distinguish "no PR" from "invalid input".
          if [ -n "${PR_NUMBER}" ]; then
            pr_json="$PR_NUMBER"
            sha_json="\"${PR_HEAD_SHA}\""
          else
            pr_json="null"
            sha_json="null"
          fi
          cat > coverage/publish/coverage-meta.json <<EOF
          {
            "event": "${EVENT_NAME}",
            "dest": "${DEST}",
            "pr_number": ${pr_json},
            "pr_head_sha": ${sha_json}
          }
          EOF

      - name: Upload publishable coverage artifact
        if: hashFiles('coverage/publish/index.html') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-publish
          path: coverage/publish/
          retention-days: 7
