# Workflow for deploying PWA previews to GitHub Pages for PRs
name: Deploy PWA Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/pwa/**'
      - 'packages/**'
      - '.github/workflows/deploy_pwa_preview.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: true
      head_repository:
        description: 'Override repository owning the branch (auto-resolved from PR when empty)'
        required: false
      ref:
        description: 'Override branch / commit SHA (auto-resolved to PR head SHA when empty)'
        required: false

permissions:
  contents: write
  pull-requests: write

# Allow only one deployment per PR at a time
concurrency:
  group: pwa-preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR head
        if: github.event_name == 'workflow_dispatch'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_HEAD_REPOSITORY: ${{ inputs.head_repository }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          pr_data=$(gh pr view "${{ inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json headRepositoryOwner,headRepository,headRefOid)
          api_repo="$(echo "$pr_data" | jq -r '.headRepositoryOwner.login + "/" + .headRepository.name')"
          api_ref="$(echo "$pr_data" | jq -r '.headRefOid')"
          echo "repo=${INPUT_HEAD_REPOSITORY:-$api_repo}" >> "$GITHUB_OUTPUT"
          echo "ref=${INPUT_REF:-$api_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo || github.repository }}
          ref: ${{ steps.pr.outputs.ref || github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build PWA with PR-specific base URL
        env:
          NODE_ENV: production
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: pnpm turbo build --filter=@niivue/pwa --force

      - name: Deploy to GitHub Pages (PR Preview)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/pwa/build
          destination_dir: pr-${{ github.event.pull_request.number || inputs.pr_number }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy PR #${{ github.event.pull_request.number || inputs.pr_number }} preview'

      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const previewUrl = `https://niivue.github.io/niivue-vscode/pr-${prNumber}/`;
            
            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const previewComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('PWA Preview Deployment')
            );
            
            const body = `## 🚀 PWA Preview Deployment
            
            Your PWA preview has been deployed!
            
            **Preview URL:** ${previewUrl}
            
            ---
            <sub>This preview will be updated automatically when you push new commits to this PR.</sub>`;
            
            if (previewComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previewComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
